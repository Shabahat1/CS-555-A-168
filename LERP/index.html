<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shape Lerp Visualizer</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; background-color: #f4f4f9; }
        canvas { background-color: white; border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        .controls { margin-top: 20px; font-size: 1.2rem; }
        input[type="range"] { width: 300px; }
    </style>
</head>
<body>

    <h2>Linear Interpolation: Shape A to B</h2>
    
    <canvas id="lerpCanvas" width="600" height="400"></canvas>
    
    <div class="controls">
        <label for="t-slider">The value of t: <span id="t-value">0.50</span></label><br>
        <input type="range" id="t-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <script src="app.js"></script>
</body>
</html>
