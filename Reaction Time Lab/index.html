<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reaction Time Test</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Letter vs Number Reaction Test</h1>

        <div id="stimulus">Press Start</div>

        <button id="startBtn">Start</button>

        <div class="stats">
            <p>Trials: <span id="trials">0</span>/10</p>
            <p>Correct: <span id="correct">0</span></p>
            <p>Average RT: <span id="avgRT">0</span> ms</p>
        </div>

        <p class="instructions">
            Press <b>A</b> for Letter | Press <b>L</b> for Number
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
